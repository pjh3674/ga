# GA Debate Arena — FastAPI(8500) + Next.js(8501)
# 실행: docker compose up -d --build

services:

  # ── New UI 계층 (FastAPI + Next.js) ──────────────────────────────────
  ga-api:
    build:
      context: .
      dockerfile: server/Dockerfile
    image: ga-api:local
    container_name: ga-api
    user: "1000:1000"
    env_file: .env
    environment:
      - GA_DB_PATH=/app/results/ga.db
    volumes:
      - ./results:/app/results
      - ./.cache:/app/.cache
      - /mnt/nas:/mnt/nas
    ports:
      - "0.0.0.0:8500:8600"   # 0.0.0.0 → Tailscale 인터페이스 포함
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:8600/api/health\",timeout=3).status==200 else 1)'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - hermes-net
      - vm103_default
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  ga-web:
    image: nginx:alpine
    container_name: ga-web
    depends_on:
      - ga-api
    volumes:
      - ./web-static:/usr/share/nginx/html:ro
    ports:
      - "0.0.0.0:8501:80"
    restart: unless-stopped
    networks:
      - hermes-net
    logging:
      driver: json-file
      options: { max-size: "5m", max-file: "2" }

  # ── 3. Ops 계층 (Phase 3에서 활성화) ────────────────────────────────
  # prometheus:
  #   image: prom/prometheus:latest
  # grafana:
  #   image: grafana/grafana:latest

networks:
  hermes-net:
    driver: bridge
  vm103_default:
    external: true   # 기존 네트워크 참조 (새로 만들지 않음)
