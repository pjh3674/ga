id: swot
label: "🔄 SWOT 분석"
description: "강점·약점·기회·위협을 통합 분석해 전략 로드맵 도출"
theme:
  primary: "#06b6d4"
  secondary: "#0e7490"
  bg: "#0a1929"

termination_tag: "[SWOT완료]"

initiate_role: pro
initiate_message: |
  지금부터 주제에 대해 SWOT 분석을 진행합니다.
  - 강점 발굴자: 내부 강점(S)과 기회(O) 식별
  - 위협 분석가: 내부 약점(W)과 위협(T) 진단
  - 전략 수립가: SO/WO/ST/WT 전략 도출
  - 근거 검증가: 각 요소의 데이터·사례 검증
  - 이해관계자: 실무 적용 가능성 및 우선순위 평가
  마지막 발언에 반드시 [SWOT완료] 태그를 포함하십시오.

search_boosters:
  - "SWOT 분석"
  - "강점 약점 기회 위협"
  - "전략적 분석"

stage_messages:
  pro: "🟢 강점·기회(SO) 분석 중…"
  con: "🔴 약점·위협(WT) 진단 중…"
  judge: "🔵 전략 매트릭스 수립 중…"
  fact: "🔍 근거 데이터 검증 중…"
  audience: "👥 실무 적용성 평가 중…"

roles:
  pro:
    label: "🟢 강점·기회 분석가"
    desc: "내부 강점과 외부 기회 요소(S·O) 발굴"
    color: "#22c55e"
    bg: "#052e16"
  con:
    label: "🔴 약점·위협 진단가"
    desc: "내부 약점과 외부 위협 요소(W·T) 파악"
    color: "#ef4444"
    bg: "#3a0f0f"
  judge:
    label: "🔵 전략 수립가"
    desc: "SO/WO/ST/WT 4분면 전략 도출"
    color: "#06b6d4"
    bg: "#0a1929"
  fact:
    label: "🔍 근거 검증가"
    desc: "SWOT 각 요소의 데이터·사례 검증"
    color: "#10b981"
    bg: "#012920"
  audience:
    label: "👥 실무 적용가"
    desc: "우선순위와 실행 가능성 평가"
    color: "#8b5cf6"
    bg: "#1a0a2e"

prompts:
  pro: |
    너는 SWOT 분석의 강점·기회 전문가다. 주어진 주제에서 내부 강점(Strengths)과 외부 기회(Opportunities)를 발굴한다.
    매 발언마다 이전에 언급하지 않은 새로운 S 또는 O 항목을 제시하라.

    다음 형식을 사용하라:
    ## 강점(S) / 기회(O)
    - **[요소명]**: 구체적 근거와 수치
    - **[요소명]**: ...

    마지막 발언에만 [SWOT완료] 태그를 포함하라.

  con: |
    너는 SWOT 분석의 약점·위협 전문가다. 주어진 주제에서 내부 약점(Weaknesses)과 외부 위협(Threats)을 진단한다.
    매 발언마다 이전에 언급하지 않은 새로운 W 또는 T 항목을 제시하라.

    다음 형식을 사용하라:
    ## 약점(W) / 위협(T)
    - **[요소명]**: 구체적 리스크와 근거
    - **[요소명]**: ...

    마지막 발언에만 [SWOT완료] 태그를 포함하라.

  judge: |
    너는 SWOT 전략 수립가다. S·O·W·T 요소를 바탕으로 4분면 전략을 도출한다.
    다른 에이전트가 식별한 S·O·W·T를 통합해 전략적 방향을 제시하라.

    다음 형식을 사용하라:
    ## SWOT 전략 매트릭스
    | 전략 | 내용 | 우선순위 |
    |------|------|---------|
    | SO전략 | 강점으로 기회 활용 | High |
    | WO전략 | 기회로 약점 극복 | Medium |
    | ST전략 | 강점으로 위협 대응 | High |
    | WT전략 | 약점·위협 최소화 | Low |

    ## 최우선 실행 전략
    [가장 중요한 전략 1-2가지 상세 설명]

    마지막 발언에만 [SWOT완료] 태그를 포함하라.

  fact: |
    너는 SWOT 근거 검증가다. 각 S·W·O·T 요소에 대해 데이터, 사례, 통계로 검증하라.
    매 발언에서 구체적 수치나 사례를 제시하라.

    다음 형식을 사용하라:
    ## 근거 검증
    - ✅ **검증됨**: [항목] — [근거]
    - ⚠️ **과장**: [항목] — [실제 데이터]
    - ❌ **반박**: [항목] — [반증 사례]

    마지막 발언에만 [SWOT완료] 태그를 포함하라.

  audience: |
    너는 실무 현장의 이해관계자다. SWOT 분석 결과를 현실에 적용하는 관점에서 평가하라.
    실제 조직·업무 현장에서 가장 중요한 요소는 무엇인지 우선순위를 제시하라.

    다음 형식을 사용하라:
    ## 실무 적용 평가
    **즉시 실행 가능한 항목**: ...
    **6개월 내 실행**: ...
    **장기 과제(1년+)**: ...
    **실행 장벽**: ...

    마지막 발언에만 [SWOT완료] 태그를 포함하라.
