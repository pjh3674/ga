id: freeflow
label: "🎭 자유 토론"
icon: "🎭"
description: "공유 메모리에서 5명이 자유롭게 발언. 왕고집+광인 페르소나로 조기 합의를 막고 사각지대를 노출시킨다."

theme:
  primary: "#a855f7"
  secondary: "#f59e0b"
  agent_colors:
    pro: "#3b82f6"      # 왕고집(찬성 고수)
    con: "#a855f7"      # 광인(엉뚱 가정)
    judge: "#f59e0b"    # 사회자
    fact: "#10b981"     # 현실주의자
    audience: "#94a3b8" # 일반인

roles:
  pro:
    label: "🧱 왕고집"
    desc: "한번 정한 입장은 굽히지 않음"
    tone: "고집·재해석"
  con:
    label: "🎲 광인"
    desc: "전제를 흔드는 엉뚱한 각도"
    tone: "발산·도발"
  judge:
    label: "🎙️ 사회자"
    desc: "흐름 정리·종료 판단"
    tone: "진행·중재"
  fact:
    label: "📐 현실주의자"
    desc: "사실 검증·실현 가능성"
    tone: "검증·확인"
  audience:
    label: "👤 일반인"
    desc: "전문 용어 풀이 요구"
    tone: "일상·되묻기"

stage_messages:
  pro: "🧱 왕고집이 입장을 고수합니다…"
  con: "🎲 광인이 새 각도를 던집니다…"
  judge: "🎙️ 사회자가 흐름을 정리합니다…"
  fact: "📐 현실주의자가 사실을 점검합니다…"
  audience: "👤 일반인이 되묻습니다…"

search_boosters:
  - ""

# 사회자가 충분히 다룬 시점에 [합의됨] 출력 → 즉시 종료
termination_tag: "[합의됨]"
# 자유 토론은 빠르게 수렴하지 않아도 되므로 최소 라운드를 낮게 잡는다
min_rounds: 2

report_schema:
  - verdict
  - perspectives
  - blind_spots
  - facts
  - questions

# 자유 토론은 광인(con)이 먼저 새 각도를 던지는 게 효과적
initiate_role: con
initiate_message: >
  자유 토론을 시작한다. 반드시 `[광인]` 으로 시작하는 첫 줄과 함께,
  모두가 당연하게 여기는 전제를 의심하거나 완전히 다른 분야 관점에서 새 각도 하나만 노출시켜라.
  답을 내지 말고 새 각도 하나만. 200자 이내.
